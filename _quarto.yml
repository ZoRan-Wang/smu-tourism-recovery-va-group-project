      - href: Proposal/Proposal.qmd
        text: Proposal
      - href: poster.qmd
        text: Poster
      - href: app-guide.qmd
        text: Shiny App
      - href: user-guide.qmd
        text: User Guide
      - text: Prototype
        menu:
          - href: prototype/EDA.qmd
            text: EDA
          - href: prototype/CDA.qmd
            text: CDA
          - href: prototype/module-cluster.qmd
            text: Clustering Prototype
          - href: prototype/forecasting.qmd
            text: Forecasting
          - href: prototype/ui-storyboard.qmd
