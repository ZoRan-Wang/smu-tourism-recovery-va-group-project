    - "*.qmd"
    - "prototype/*.qmd"
    - "team/*.qmd"
    - "team/jin-qinhao/**/*.qmd"
    - "Meeting Minutes/*.qmd"
    - "!templates/"
    - "!artifacts/"
    - "!app/"
    - "!scripts/"
