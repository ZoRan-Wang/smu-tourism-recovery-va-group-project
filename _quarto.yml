project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "prototype/*.qmd"
    - "team/*.qmd"
    - "team/jin-qinhao/**/*.qmd"
    - "Meeting Minutes/*.qmd"
    - "!templates/"
    - "!artifacts/"
    - "!app/"
    - "!scripts/"
    - "!data/"

website:
  title: "Singapore Tourism Time-Series Visual Analytics"
  navbar:
    background: "#0f3d3e"
    right:
      - href: index.qmd
        text: Home
      - href: Proposal/Proposal.qmd
        text: Proposal
      - text: Prototype
        menu:
          - href: prototype/EDA.qmd
            text: Time Series Visual Analysis
          - href: prototype/module-cluster.qmd
            text: Time Series Clustering
          - href: Proposal/Proposal.qmd#time-series-forecasting
            text: Forecasting
          - href: prototype/ui-storyboard.qmd
            text: UI Storyboard
      - href: app-guide.qmd
        text: Shiny App
      - href: team/onboarding.qmd
        text: Team
  page-footer:
    center: "SMU Visual Analytics Group Project | Updated 2026-03-29"

format:
  html:
    theme: [cosmo, styles/theme.scss]
    toc: true
    smooth-scroll: true
    code-copy: true

execute:
  freeze: auto
  warning: false
  message: false
